<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Outer ring accent -->
  <rect width="512" height="512" rx="96" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- "E" letterform — clean geometric -->
  <!-- Vertical bar -->
  <rect x="148" y="148" width="48" height="216" rx="6" fill="#ffffff"/>
  <!-- Top horizontal -->
  <rect x="148" y="148" width="180" height="44" rx="6" fill="#ffffff"/>
  <!-- Middle horizontal -->
  <rect x="148" y="234" width="148" height="44" rx="6" fill="#ffffff"/>
  <!-- Bottom horizontal -->
  <rect x="148" y="320" width="180" height="44" rx="6" fill="#ffffff"/>

  <!-- Chart spark — green upward line overlaying bottom-right of the E -->
  <polyline
    points="296,330 328,290 358,308 390,252"
    fill="none"
    stroke="#10b981"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dot at peak -->
  <circle cx="390" cy="252" r="12" fill="#10b981"/>
</svg>
